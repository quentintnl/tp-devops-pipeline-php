# ─────────────────────────────────────────────────────────────────────────────
# Config du service `web` (nginx) : reverse-proxy FastCGI → service `app` (php-fpm).
# nginx ne sert PAS le code PHP lui-même : il relaie tout `.php` vers `app:9000`.
# Le code est lu par le conteneur `app`, donc SCRIPT_FILENAME pointe un chemin qui
# existe côté `app` (/var/www/html/public/...), pas côté `web`.
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    # Front controller : toute requête inconnue retombe sur index.php.
    location / {
        try_files $uri /index.php$is_args$args;
    }

    # Exécution PHP déléguée à php-fpm (service `app`) via FastCGI.
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        # Chemin du script tel que vu par `app` (le conteneur qui exécute le PHP).
        fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   /var/www/html/public;
    }

    # Endpoint de confort pour le healthcheck nginx (relaie vers l'app).
    location = /health {
        try_files $uri /index.php$is_args$args;
    }
}
