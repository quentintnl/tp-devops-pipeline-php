name: 🚀 Build PHP Application

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: 🏗️ Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, bcmath, curl, xml, zip
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        run: composer test

      - name: Build Docker image
        run: docker build -t my-php-app:latest .

      - name: 🐯 Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.registry }}/${{ env.IMAGE_REPOSITORY }}:latest
          format: table
          exit-code: '1'              # fait échouer le job si vulnérabilité trouvée
          severity: CRITICAL,HIGH
          ignore-unfixed: true